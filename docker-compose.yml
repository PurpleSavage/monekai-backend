version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: moneka_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: moneka_app
    restart: on-failure
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - HOST=db
      - USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - SSLMODE=${DB_SSLMODE}
      - JWT_SECRET=${JWT_SECRET}
      - CLERK_KEY=${CLERK_KEY}
      - PUBLIC_KEY=${PUBLIC_KEY}

volumes:
  postgres_data: